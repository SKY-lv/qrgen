<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRGen - 二维码生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.app{max-width:800px;margin:0 auto;padding:20px;}
.header{text-align:center;margin-bottom:24px;}
.header h1{font-size:1.5em;} .header h1 span{color:#10b981;}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;}
.card h2{font-size:14px;margin-bottom:12px;color:#94a3b8;}
.input-group{margin-bottom:12px;}
.input-group label{display:block;font-size:12px;color:#64748b;margin-bottom:4px;}
.input-group input,.input-group textarea,.input-group select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:12px;font-size:14px;}
.input-group textarea{min-height:100px;resize:vertical;}
.input-group input:focus,.input-group textarea:focus,.input-group select:focus{outline:none;border-color:#10b981;}
.options{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;}
.option{display:flex;flex-direction:column;gap:4px;}
.option label{font-size:12px;color:#64748b;}
.option input,.option select{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px;font-size:13px;}
.btn{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s;}
.btn-primary{background:#10b981;color:#000;}
.btn-primary:hover{background:#059669;}
.btn-secondary{background:#334155;color:#e2e8f0;}
.btn-secondary:hover{background:#475569;}
.qr-output{text-align:center;padding:20px;}
.qr-output canvas{border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.formats{display:flex;gap:8px;justify-content:center;margin-top:12px;}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1><span>QR</span>Gen</h1></div>
  
  <div class="card">
    <h2>内容</h2>
    <div class="input-group">
      <label>文本/URL</label>
      <textarea id="content" placeholder="输入文本、URL或任何内容...">https://example.com</textarea>
    </div>
    
    <div class="options">
      <div class="option">
        <label>尺寸</label>
        <select id="size">
          <option value="128">128px</option>
          <option value="200" selected>200px</option>
          <option value="256">256px</option>
          <option value="300">300px</option>
          <option value="400">400px</option>
        </select>
      </div>
      <div class="option">
        <label>容错级别</label>
        <select id="level">
          <option value="L">L (7%)</option>
          <option value="M" selected>M (15%)</option>
          <option value="Q">Q (25%)</option>
          <option value="H">H (30%)</option>
        </select>
      </div>
      <div class="option">
        <label>边距</label>
        <select id="margin">
          <option value="0">无</option>
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="4">4</option>
        </select>
      </div>
    </div>
    
    <div class="options">
      <div class="option">
        <label>前景色</label>
        <input type="color" id="dark" value="#000000">
      </div>
      <div class="option">
        <label>背景色</label>
        <input type="color" id="light" value="#ffffff">
      </div>
    </div>
    
    <button class="btn btn-primary" onclick="generate()" style="width:100%;margin-top:12px">生成二维码</button>
  </div>
  
  <div class="card">
    <h2>二维码</h2>
    <div class="qr-output">
      <canvas id="qr-canvas"></canvas>
    </div>
    <div class="formats">
      <button class="btn btn-secondary" onclick="downloadPNG()">📥 PNG</button>
      <button class="btn btn-secondary" onclick="downloadSVG()">📥 SVG</button>
      <button class="btn btn-secondary" onclick="copyCanvas()">📋 复制</button>
    </div>
  </div>
</div>

<script>
// Simple QR Code implementation
const canvas = document.getElementById('qr-canvas');
const ctx = canvas.getContext('2d');

function generate() {
  const text = document.getElementById('content').value;
  if (!text) return;
  
  const size = parseInt(document.getElementById('size').value);
  const margin = parseInt(document.getElementById('margin').value);
  const dark = document.getElementById('dark').value;
  const light = document.getElementById('light').value;
  
  // Generate QR matrix using simple encoding
  const qr = generateQRMatrix(text);
  
  const moduleSize = Math.floor(size / (qr.length + margin * 2));
  const actualSize = moduleSize * (qr.length + margin * 2);
  
  canvas.width = actualSize;
  canvas.height = actualSize;
  
  ctx.fillStyle = light;
  ctx.fillRect(0, 0, actualSize, actualSize);
  
  ctx.fillStyle = dark;
  for (let y = 0; y < qr.length; y++) {
    for (let x = 0; x < qr.length; x++) {
      if (qr[y][x]) {
        ctx.fillRect((x + margin) * moduleSize, (y + margin) * moduleSize, moduleSize, moduleSize);
      }
    }
  }
}

function generateQRMatrix(text) {
  // Simplified QR generation - creates a basic pattern
  // For production, use a proper QR library like qrcode.js
  
  const size = 21; // Version 1 QR
  const matrix = Array(size).fill(0).map(() => Array(size).fill(false));
  
  // Add finder patterns
  addFinderPattern(matrix, 0, 0);
  addFinderPattern(matrix, size - 7, 0);
  addFinderPattern(matrix, 0, size - 7);
  
  // Add timing patterns
  for (let i = 8; i < size - 8; i++) {
    matrix[6][i] = i % 2 === 0;
    matrix[i][6] = i % 2 === 0;
  }
  
  // Encode data (simplified)
  const data = encodeData(text);
  let bitIndex = 0;
  
  for (let y = size - 1; y >= 0; y -= 2) {
    for (let x = 0; x < size; x++) {
      for (let dy = 0; dy < 2; dy++) {
        const yy = y - dy;
        if (yy < 0 || yy >= size) continue;
        if (isReserved(matrix, x, yy, size)) continue;
        if (bitIndex < data.length) {
          matrix[yy][x] = data[bitIndex++] === '1';
        }
      }
    }
  }
  
  return matrix;
}

function addFinderPattern(matrix, x, y) {
  for (let dy = 0; dy < 7; dy++) {
    for (let dx = 0; dx < 7; dx++) {
      const isBlack = dy === 0 || dy === 6 || dx === 0 || dx === 6 ||
                      (dy >= 2 && dy <= 4 && dx >= 2 && dx <= 4);
      matrix[y + dy][x + dx] = isBlack;
    }
  }
}

function isReserved(matrix, x, y, size) {
  // Finder patterns
  if (x < 8 && y < 8) return true;
  if (x < 8 && y >= size - 8) return true;
  if (x >= size - 8 && y < 8) return true;
  // Timing patterns
  if (x === 6 || y === 6) return true;
  return false;
}

function encodeData(text) {
  // Simple byte encoding
  let bits = '0100'; // Byte mode
  bits += text.length.toString(2).padStart(8, '0');
  
  for (let i = 0; i < text.length; i++) {
    bits += text.charCodeAt(i).toString(2).padStart(8, '0');
  }
  
  // Pad to capacity (Version 1 = 152 bits data capacity)
  while (bits.length < 152) {
    bits += bits.length % 16 < 8 ? '0' : '1';
  }
  
  return bits.slice(0, 152);
}

function downloadPNG() {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'qrcode.png';
  a.click();
}

function downloadSVG() {
  const size = canvas.width;
  const imageData = ctx.getImageData(0, 0, size, size);
  
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">`;
  svg += `<rect width="100%" height="100%" fill="${document.getElementById('light').value}"/>`;
  
  const dark = document.getElementById('dark').value;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const i = (y * size + x) * 4;
      if (imageData.data[i] < 128) {
        svg += `<rect x="${x}" y="${y}" width="1" height="1" fill="${dark}"/>`;
      }
    }
  }
  svg += '</svg>';
  
  const blob = new Blob([svg], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'qrcode.svg';
  a.click();
}

function copyCanvas() {
  canvas.toBlob(blob => {
    const item = new ClipboardItem({'image/png': blob});
    navigator.clipboard.write([item]);
  });
}

generate();
</script>
</body>
</html>
